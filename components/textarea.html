<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <script>
    (function () {
      try {
        var t = localStorage.getItem("akana-theme");
        if (t === "light" || t === "dark") {
          document.documentElement.setAttribute("data-theme", t);
        }
      } catch (e) {}
    })();
  </script>
  <title>Akana · Textarea</title>
  <link rel="stylesheet" href="../assets/fonts.css">
  <link rel="stylesheet" href="../assets/tokens.css">
  <link rel="stylesheet" href="../assets/components.css">
</head>
<body class="akana">
  <main class="ak-demo">
    <div class="ak-demo-bar">
      <a class="ak-btn ak-btn--secondary ak-btn--sm" href="../index.html">
        <span class="ak-icon" data-icon="arrow-left"></span> Gallery
      </a>
      <button class="ak-btn ak-btn--secondary ak-btn--sm" id="theme-btn" type="button" aria-pressed="false">
        <span class="ak-icon" data-icon="moon"></span> Dark
      </button>
    </div>

    <span class="ak-label">Component</span>
    <h1>Textarea</h1>
    <p class="lead">Multi-line text, same border and focus language as input. Error state stays monochrome — stronger border, clearer helper.</p>

    <div class="ak-stack" style="max-width: 480px;">
      <div class="ak-field">
        <label class="ak-field__label" for="ex-bio">Bio</label>
        <textarea id="ex-bio" class="ak-textarea" rows="5" placeholder="A short description…"></textarea>
        <span class="ak-field__help">Max 280 characters. Plain text only.</span>
      </div>

      <div class="ak-field ak-field--error">
        <label class="ak-field__label" for="ex-note">Release notes</label>
        <textarea id="ex-note" class="ak-textarea" rows="4">Missing required summary.</textarea>
        <span class="ak-field__help">Add at least one complete sentence.</span>
      </div>
    </div>
  </main>
  <script src="../assets/icons.js"></script>
  <script src="../assets/theme.js"></script>
</body>
</html>
