<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <script>
    (function () {
      try {
        var t = localStorage.getItem("akana-theme");
        if (t === "light" || t === "dark") {
          document.documentElement.setAttribute("data-theme", t);
        }
      } catch (e) {}
    })();
  </script>
  <title>Akana · Checkbox</title>
  <link rel="stylesheet" href="../assets/fonts.css">
  <link rel="stylesheet" href="../assets/tokens.css">
  <link rel="stylesheet" href="../assets/components.css">
</head>
<body class="akana">
  <main class="ak-demo">
    <div class="ak-demo-bar">
      <a class="ak-btn ak-btn--secondary ak-btn--sm" href="../index.html">
        <span class="ak-icon" data-icon="arrow-left"></span> Gallery
      </a>
      <button class="ak-btn ak-btn--secondary ak-btn--sm" id="theme-btn" type="button" aria-pressed="false">
        <span class="ak-icon" data-icon="moon"></span> Dark
      </button>
    </div>

    <span class="ak-label">Component</span>
    <h1>Checkbox</h1>
    <p class="lead">Binary multi-select. Checked state is ink fill + check icon — no hue. Works with native <code>&lt;input type="checkbox"&gt;</code> for progressive enhancement.</p>

    <div class="ak-stack" style="max-width: 420px;">
      <section>
        <div class="ak-section-title">Default</div>
        <div class="ak-choice-group">
          <label class="ak-choice">
            <input type="checkbox" checked>
            <span class="ak-choice__box"><span class="ak-icon" data-icon="check" data-size="12"></span></span>
            <span class="ak-choice__text">Email digests
              <span class="ak-choice__hint">Weekly summary of activity.</span>
            </span>
          </label>
          <label class="ak-choice">
            <input type="checkbox">
            <span class="ak-choice__box"><span class="ak-icon" data-icon="check" data-size="12"></span></span>
            <span class="ak-choice__text">Product updates</span>
          </label>
          <label class="ak-choice">
            <input type="checkbox" disabled>
            <span class="ak-choice__box"><span class="ak-icon" data-icon="check" data-size="12"></span></span>
            <span class="ak-choice__text">Legacy channel (disabled)</span>
          </label>
        </div>
      </section>
    </div>
  </main>
  <script src="../assets/icons.js"></script>
  <script src="../assets/theme.js"></script>
</body>
</html>
