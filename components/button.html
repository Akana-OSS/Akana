<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kern · Button</title>
  <link rel="stylesheet" href="../assets/fonts.css">
  <link rel="stylesheet" href="../assets/tokens.css">
  <link rel="stylesheet" href="../assets/components.css">
</head>
<body class="kern">
  <main class="k-demo">
    <span class="k-label">Component</span>
    <h1>Button</h1>
    <p class="lead">Primary action in ink. Secondary and ghost variants keep weight off the page. Icons sit inline with the label.</p>

    <div class="k-stack">
      <section>
        <div class="k-section-title">Variants</div>
        <div class="k-row">
          <button class="k-btn" type="button">
            <span class="k-icon" data-icon="plus"></span> New item
          </button>
          <button class="k-btn k-btn--secondary" type="button">
            <span class="k-icon" data-icon="download"></span> Download
          </button>
          <button class="k-btn k-btn--ghost" type="button">Cancel</button>
          <button class="k-btn" type="button" disabled>
            <span class="k-icon" data-icon="check"></span> Done
          </button>
        </div>
      </section>

      <section>
        <div class="k-section-title">Sizes</div>
        <div class="k-row">
          <button class="k-btn k-btn--sm" type="button">Small</button>
          <button class="k-btn" type="button">Medium</button>
          <button class="k-btn k-btn--lg" type="button">Large</button>
        </div>
      </section>

      <section>
        <div class="k-section-title">Icon only</div>
        <div class="k-row">
          <button class="k-btn k-btn--secondary" type="button" aria-label="Search">
            <span class="k-icon" data-icon="search"></span>
          </button>
          <button class="k-btn k-btn--secondary" type="button" aria-label="Settings">
            <span class="k-icon" data-icon="settings"></span>
          </button>
        </div>
      </section>
    </div>
  </main>
  <script src="../assets/icons.js"></script>
</body>
</html>
