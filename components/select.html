<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <script>
    (function () {
      try {
        var t = localStorage.getItem("akana-theme");
        if (t === "light" || t === "dark") {
          document.documentElement.setAttribute("data-theme", t);
        }
      } catch (e) {}
    })();
  </script>
  <title>Akana · Select</title>
  <link rel="stylesheet" href="../assets/fonts.css">
  <link rel="stylesheet" href="../assets/tokens.css">
  <link rel="stylesheet" href="../assets/components.css">
</head>
<body class="akana">
  <main class="ak-demo">
    <div class="ak-demo-bar">
      <a class="ak-btn ak-btn--secondary ak-btn--sm" href="../index.html">
        <span class="ak-icon" data-icon="arrow-left"></span> Gallery
      </a>
      <button class="ak-btn ak-btn--secondary ak-btn--sm" id="theme-btn" type="button" aria-pressed="false">
        <span class="ak-icon" data-icon="moon"></span> Dark
      </button>
    </div>

    <span class="ak-label">Component</span>
    <h1>Select</h1>
    <p class="lead">Native <code>&lt;select&gt;</code> with a monochrome chevron. Focus ring matches input fields. Prefer native over custom menus for accessibility and progressive enhancement.</p>

    <div class="ak-stack" style="max-width: 420px;">
      <div class="ak-field">
        <label class="ak-field__label" for="ex-region">Region</label>
        <div class="ak-select-wrap">
          <select id="ex-region" class="ak-select">
            <option value="">Choose a region…</option>
            <option>Europe</option>
            <option selected>Middle East</option>
            <option>Americas</option>
            <option>Asia Pacific</option>
          </select>
          <span class="ak-select__chevron ak-icon" data-icon="chevron-down" data-size="18"></span>
        </div>
        <span class="ak-field__help">Used for latency-sensitive endpoints.</span>
      </div>

      <div class="ak-field ak-field--error">
        <label class="ak-field__label" for="ex-role">Role</label>
        <div class="ak-select-wrap">
          <select id="ex-role" class="ak-select">
            <option value="">Select a role…</option>
            <option>Viewer</option>
            <option>Editor</option>
            <option>Admin</option>
          </select>
          <span class="ak-select__chevron ak-icon" data-icon="chevron-down" data-size="18"></span>
        </div>
        <span class="ak-field__help">A role is required to continue.</span>
      </div>

      <div class="ak-field">
        <label class="ak-field__label" for="ex-disabled">Disabled</label>
        <div class="ak-select-wrap">
          <select id="ex-disabled" class="ak-select" disabled>
            <option>Locked choice</option>
          </select>
          <span class="ak-select__chevron ak-icon" data-icon="chevron-down" data-size="18"></span>
        </div>
      </div>
    </div>
  </main>
  <script src="../assets/icons.js"></script>
  <script src="../assets/theme.js"></script>
</body>
</html>
