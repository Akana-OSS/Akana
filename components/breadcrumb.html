<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <script>
    (function () {
      try {
        var t = localStorage.getItem("akana-theme");
        if (t === "light" || t === "dark") {
          document.documentElement.setAttribute("data-theme", t);
        }
      } catch (e) {}
    })();
  </script>
  <title>Akana · Breadcrumb</title>
  <link rel="stylesheet" href="../assets/fonts.css">
  <link rel="stylesheet" href="../assets/tokens.css">
  <link rel="stylesheet" href="../assets/components.css">
</head>
<body class="akana">
  <main class="ak-demo">
    <div class="ak-demo-bar">
      <a class="ak-btn ak-btn--secondary ak-btn--sm" href="../index.html">
        <span class="ak-icon" data-icon="arrow-left"></span> Gallery
      </a>
      <button class="ak-btn ak-btn--secondary ak-btn--sm" id="theme-btn" type="button" aria-pressed="false">
        <span class="ak-icon" data-icon="moon"></span> Dark
      </button>
    </div>

    <span class="ak-label">Component</span>
    <h1>Breadcrumb</h1>
    <p class="lead">Wayfinding trail. Separators are chevrons; current page is ink weight, not a colored chip. Use a <code>nav</code> landmark with an accessible name.</p>

    <nav aria-label="Breadcrumb" style="max-width: 560px;">
      <ol class="ak-breadcrumb">
        <li class="ak-breadcrumb__item">
          <a href="#">Home</a>
          <span class="ak-breadcrumb__sep ak-icon" data-icon="chevron-right" data-size="14" aria-hidden="true"></span>
        </li>
        <li class="ak-breadcrumb__item">
          <a href="#">Projects</a>
          <span class="ak-breadcrumb__sep ak-icon" data-icon="chevron-right" data-size="14" aria-hidden="true"></span>
        </li>
        <li class="ak-breadcrumb__item">
          <a href="#">Akana</a>
          <span class="ak-breadcrumb__sep ak-icon" data-icon="chevron-right" data-size="14" aria-hidden="true"></span>
        </li>
        <li class="ak-breadcrumb__item" aria-current="page">Components</li>
      </ol>
    </nav>
  </main>
  <script src="../assets/icons.js"></script>
  <script src="../assets/theme.js"></script>
</body>
</html>
